name: Auto Close Issues

on:
  issues:
    types: [labeled]

jobs:
  close-completed-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issues labeled completed or wontfix
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.issue.labels.map(l => l.name.toLowerCase());
            if (labels.includes('completed') || labels.includes('wontfix')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: labels.includes('completed') ? 'completed' : 'not_planned'
              });
              console.log(`Issue #${context.issue.number} closed due to label: ${labels.find(l => l === 'completed' || l === 'wontfix')}`);
            }